name: Fetch CDR Data Daily

on:
  schedule:
    # Runs once daily at 12:30 AM IST (19:00 UTC)
    - cron: '0 19 * * *'

  workflow_dispatch:

jobs:
  fetch-cdr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python script
        env:
          OZONETEL_API_KEY: ${{ secrets.OZONETEL_API_KEY }}
          OZONETEL_USERNAME: ${{ secrets.OZONETEL_USERNAME }}
        run: |
          python fetch_cdr.py

      - name: Commit and push CSV
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cdr_data_master.csv
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "CDR data for yesterday"
          git push
